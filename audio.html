<!DOCTYPE html>
<html>
<head>
    <title>Global Audio Player</title>
</head>
<body>
    <h1>Welcome to my Radio</h1>
    
    <audio id="globalTrack" preload="auto">
        <source src="https://raw.githubusercontent.com/ahamad-ali786/HTML/main/rooba rooba.ogg" type="audio/ogg">
        Your browser is too old!
    </audio>

    <button id="playBtn">Click to Play Music</button>

    <script>
      const audio = document.getElementById('globalTrack');
const btn = document.getElementById('playBtn');

btn.addEventListener('click', () => {
    // Check if audio is paused, then play
    if (audio.paused) {
        audio.play()
            .then(() => {
                btn.textContent = "Pause Music";
            })
            .catch(error => {
                console.error("Playback failed:", error);
            });
    } else {
        audio.pause();
        btn.textContent = "Click to Play Music";
    }
});

    </script>
</body>
</html>
